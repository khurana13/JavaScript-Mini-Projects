<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container text-center mt-3">
        <h1>Weather Station</h1> 
        <p>Welcome to the Weather Station! Here you can find the latest weather updates and forecasts for any area.</p>
        <div class="card">
            <div class="card-body">
                <input placeholder="Enter City Name" class="form-control" id="city">
                <br>
                <button type="button" class="btn btn-success" onclick="fetch_data()">Fetch Data</button>
                <div id="result"></div>
            </div>                
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
