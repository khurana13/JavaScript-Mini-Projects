<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container text-center mt-3">

        <h1>Stopwatch</h1>

        <div class="btn-group mt-3" role="group" aria-label="Basic mixed styles example">
            <button type="button" class="btn btn-success" id="startbtn" onclick="start_timer()">Start</button>
            <button type="button" class="btn btn-warning" id="pausebtn" onclick="pause_timer()">Pause/Resume</button>
            <button type="button" class="btn btn-danger" id="clearbtn" onclick="clear_timer()">Clear</button>
        </div>

        <div id="result" class="text-center mt-5">
            <h1>00:00:00</h1>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
